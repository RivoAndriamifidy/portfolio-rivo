<section class="contact-section reveal" id="contact">
  <div class="section-head">
    <div class="sec-label">Contact</div>
    <h2 class="sec-title">Travaillons ensemble</h2>
  </div>

  <div class="contact-box">
    <div class="contact-avail">Disponible pour missions</div>
    <p class="contact-intro">
      Un projet en tête ? Envoyez-moi un message et je vous répondrai rapidement.
    </p>

    <form class="contact-form" [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-row">
        <label>
          Nom
          <input type="text" formControlName="name" placeholder="Votre nom" />
        </label>
        <label>
          Email
          <input type="email" formControlName="email" placeholder="vous@email.com" />
        </label>
      </div>

      <label>
        Sujet
        <input type="text" formControlName="subject" placeholder="Sujet (optionnel)" />
      </label>

      <label>
        Message
        <textarea formControlName="message" rows="5" placeholder="Décrivez votre projet..."></textarea>
      </label>

      <button class="btn-glow" type="submit" [disabled]="submitting()">
        {{ submitting() ? 'Envoi en cours...' : 'Envoyer le message' }}
      </button>

      @if (success()) {
        <p class="form-feedback success">Message envoyé avec succès !</p>
      }
      @if (error()) {
        <p class="form-feedback error">Erreur lors de l'envoi. Réessayez plus tard.</p>
      }
    </form>

    <div class="contact-links">
      <a class="contact-link" [href]="'mailto:' + email()">
        <svg viewBox="0 0 24 24"><path d="M4 4h16v16H4z"/><path d="M4 8l8 5 8-5"/></svg>
        {{ email() }}
      </a>
      <a class="contact-link" [href]="'tel:' + phone().replaceAll(' ', '')">
        <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        {{ phone() }}
      </a>
      <a class="contact-link" href="https://github.com/RivoAndriamifidy" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24"><path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/></svg>
        GitHub
      </a>
    </div>
  </div>
</section>
