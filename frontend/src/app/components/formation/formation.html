<section id="formation" class="reveal">
  <div class="sec-label">Formation</div>
  <h2 class="sec-title">Parcours académique</h2>

  @if (loading()) {
    <p>Chargement des formations...</p>
  } @else {
    <div class="formation-list">
      @for (formation of formations(); track formation.id) {
        <article class="formation-item">
          <div class="formation-date">{{ formation.period }}</div>
          <div class="formation-content">
            <h3 class="formation-degree">{{ formation.title }}</h3>
            <p class="formation-school">{{ formation.institution }}</p>
            @if (formation.description) {
              <p class="project-desc" style="margin-top: 0.5rem">{{ formation.description }}</p>
            }
          </div>
        </article>
      }
    </div>
  }
</section>
