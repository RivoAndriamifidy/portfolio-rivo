<header
  class="site-header"
  [class.is-scrolled]="isScrolled()"
  [class.menu-open]="menuOpen()"
>
  <div class="nav-glow" aria-hidden="true"></div>

  <nav class="nav-bar" aria-label="Navigation principale">
    <a class="nav-logo" routerLink="/" href="/" (click)="goHome($event)">
      <span class="nav-logo-mark">
        <img src="/logo/logo-rivo.png" alt="Logo Rivo" width="40" height="40" />
      </span>
      <span class="nav-brand">
        <span class="nav-logo-text">Rivo<span>.</span>dev</span>
        <span class="nav-tagline">Développeur Full Stack</span>
      </span>
    </a>

    <div class="nav-panel">
      <ul class="nav-links">
        <li>
          <a
            class="nav-link"
            href="/#services"
            (click)="navigateSection('services', $event)"
            [class.active]="isHomeSection('services')"
          >
            Services
          </a>
        </li>
        <li>
          <a
            class="nav-link"
            href="/#projects"
            (click)="navigateSection('projects', $event)"
            [class.active]="isHomeSection('projects')"
          >
            Projets
          </a>
        </li>
        <li>
          <a
            class="nav-link"
            href="/#stack"
            (click)="navigateSection('stack', $event)"
            [class.active]="isHomeSection('stack')"
          >
            Stack
          </a>
        </li>
        <li>
          <a
            class="nav-link"
            href="/#formation"
            (click)="navigateSection('formation', $event)"
            [class.active]="isHomeSection('formation')"
          >
            Formation
          </a>
        </li>
        <li>
          <a
            class="nav-link"
            href="/#contact"
            (click)="navigateSection('contact', $event)"
            [class.active]="isHomeSection('contact')"
          >
            Contact
          </a>
        </li>
      </ul>

      <div class="nav-actions">
        <span class="nav-status">
          <span class="nav-status-dot"></span>
          Disponible
        </span>
        <a
          class="nav-cta"
          href="/#contact"
          (click)="navigateSection('contact', $event)"
        >
          <span>Me contacter</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 12h14M13 6l6 6-6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </a>
      </div>
    </div>

    <button
      type="button"
      class="nav-burger"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Ouvrir le menu"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </nav>

  <button
    type="button"
    class="nav-backdrop"
    (click)="closeMenu()"
    aria-label="Fermer le menu"
  ></button>
</header>
