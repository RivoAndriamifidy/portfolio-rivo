databases:
  - name: portfolio-rivo-db
    plan: free
    databaseName: portfolio_rivo
    user: portfolio_rivo

services:
  - type: web
    name: rivoandry-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && npm run db:seed
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-rivo-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://rivoandry.site,https://www.rivoandry.site,http://localhost:4200
      - key: PORT
        value: 10000
    autoDeploy: true