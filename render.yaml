databases:
  - name: portfolio-rivo-db
    plan: free
    databaseName: portfolio_rivo
    user: portfolio_rivo

services:
  - type: web
    name: rivoandry-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-rivo-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://rivoandry.site,https://www.rivoandry.site,http://localhost:4200
      - key: PORT
        value: "10000"
    autoDeploy: true