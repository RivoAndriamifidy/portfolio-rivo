databases:
  - name: portfolio-rivo-db
    plan: free
    databaseName: portfolio_rivo
    user: portfolio_rivo

services:
  - type: web
    name: portfolio-rivo-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build && npm run db:seed
    startCommand: npm run start:prod
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-rivo-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://portfolio-rivo.onrender.com
      - key: PORT
        value: 10000
    autoDeploy: true

  - type: web
    name: portfolio-rivo
    runtime: static
    plan: free
    buildCommand: npm install && npm run build:static
    staticPublishPath: dist/portfolio-rivo/browser
    envVars:
      - key: NODE_VERSION
        value: 20
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true