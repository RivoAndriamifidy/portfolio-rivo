# Sync Render Blueprint sur la branche main (commit le plus recent)
databases:
  - name: portfolio-rivo-db
    plan: free
    databaseName: portfolio_rivo
    user: portfolio_rivo

services:
  - type: web
    name: rivoandry-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install --include=dev && npm run render:build
    startCommand: npm run render:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: portfolio-rivo-db
          property: connectionString
      - key: CORS_ORIGIN
        value: https://rivoandry.site,https://www.rivoandry.site,https://portfolio-rivo.vercel.app,http://localhost:4200
      - key: PORT
        value: "10000"
      - key: CONTACT_TO_EMAIL
        value: rivoandriamifidy0@gmail.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: rivoandriamifidy0@gmail.com
      - key: SMTP_FROM
        value: Portfolio Rivo <rivoandriamifidy0@gmail.com>
      - key: SMTP_PASS
        sync: false
    autoDeploy: true